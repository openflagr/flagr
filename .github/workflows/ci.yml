name: ci

on:
  push:
    branches: ['main']
  pull_request:

permissions:
  contents: read
jobs:
  unit_test:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: 0
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26
      - name: Check out source code
        uses: actions/checkout@v4
      - run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - run: make deps
      - run: make ci-swagger
      - run: make ci
      - run: make benchmark
      - uses: codecov/codecov-action@v4
  ui_lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check out source code
        uses: actions/checkout@v4
      - run: make build-ui
  integration_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Integration tests and benchmarks (Docker Compose)
        run: make ci-integration
  e2e_test:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check out source code
        uses: actions/checkout@v4
      - run: make test-e2e
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download actionlint
        id: get_actionlint
        run: bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
        shell: bash
      - name: Check workflow files
        run: ${{ steps.get_actionlint.outputs.executable }} -color
        shell: bash
  dep_freshness:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check out source code
        uses: actions/checkout@v4
      - name: Check Go dependency freshness (5-day minimum age)
        run: MIN_AGE_DAYS=5 ./scripts/check-dep-freshness.sh
