get:
  tags:
    - evaluation
  operationId: getEvaluationBatch
  parameters:
    - in: query
      name: json
      description: >-
        Percent-encoded (URI-encoded) JSON matching POST /evaluation/batch body (evaluationBatchRequest).
        Example: ?json=%7B%22entities%22%3A%5B%7B%22entityID%22%3A%22u1%22%7D%5D%2C%22flagIDs%22%3A%5B1%5D%7D
        decodes to {"entities":[{"entityID":"u1"}],"flagIDs":[1]}.
      required: true
      type: string
  responses:
    200:
      description: evaluation batch result
      schema:
        $ref: "#/definitions/evaluationBatchResponse"
    default:
      description: generic error response
      schema:
        $ref: "#/definitions/error"
post:
  tags:
    - evaluation
  operationId: postEvaluationBatch
  parameters:
    - in: body
      name: body
      description: evaluation batch request
      required: true
      schema:
        $ref: "#/definitions/evaluationBatchRequest"
  responses:
    200:
      description: evaluation batch result
      schema:
        $ref: "#/definitions/evaluationBatchResponse"
    default:
      description: generic error response
      schema:
        $ref: "#/definitions/error"